services:
  - type: web
    name: vigil-scrapers
    runtime: python
    region: frankfurt
    plan: free
    rootDir: scrapers
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: ZENROWS_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
